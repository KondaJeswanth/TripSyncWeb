name: TripSync E2E Test Suite

on:
  push:
    branches: ["**"]          # Triggers on every push to any branch
  pull_request:
    branches: ["**"]
  workflow_dispatch:           # Manual trigger from GitHub Actions UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false    # Don't cancel; always complete test runs

jobs:
  selenium-e2e-tests:
    name: "🧪 Selenium E2E Tests → XLSX Report"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TRIPSYNC_URL:    ${{ secrets.TRIPSYNC_URL    || 'https://abineshh502.github.io/TripSyncWeb-Frontend' }}
      TRIPSYNC_API_URL: ${{ secrets.TRIPSYNC_API_URL || 'https://tripsyncweb-backend.onrender.com' }}
      HEADLESS:        "true"
      TIMEOUT:         "25"
      REPORT_DIR:      "test-results"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: "📦 Checkout Repository"
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "tests/requirements.txt"

      # ── 3. Install test dependencies ─────────────────────────────────────────
      - name: "📥 Install Test Dependencies"
        run: pip install -r tests/requirements.txt

      # ── 4. Chrome & ChromeDriver setup ───────────────────────────────────────
      - name: "🌐 Setup Chrome & ChromeDriver"
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: "stable"

      # ── 5. Create results directory ───────────────────────────────────────────
      - name: "📁 Create Results Directory"
        run: mkdir -p test-results

      # ── 6. Wait for Render backend to wake up (free tier cold start) ──────────
      - name: "⏳ Warm Up Production Backend (Render cold start)"
        run: |
          echo "Pinging backend to wake up free-tier Render instance..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "${{ env.TRIPSYNC_API_URL }}/" || echo "000")
            echo "  Attempt $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ] || [ "$STATUS" = "422" ]; then
              echo "✅ Backend is awake (HTTP $STATUS)"
              break
            fi
            echo "  Sleeping 15s..."
            sleep 15
          done

      # ── 7. Run E2E test suite ─────────────────────────────────────────────────
      - name: "🧪 Run Selenium E2E Test Suite"
        run: |
          python tests/test_tripsync.py 2>&1 | tee test-results/test_output.txt
        continue-on-error: true   # Always upload report, even if tests fail

      # ── 8. List generated reports ─────────────────────────────────────────────
      - name: "📋 List Generated Reports"
        run: |
          echo "=== Files in test-results/ ==="
          ls -lah test-results/ || echo "No files found"
          echo ""
          echo "=== Test Output Summary ==="
          tail -30 test-results/test_output.txt || true

      # ── 9. Upload XLSX report as artifact ─────────────────────────────────────
      - name: "📊 Upload XLSX Test Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "TripSync-E2E-Report-${{ github.run_number }}-${{ github.sha }}"
          path: |
            test-results/*.xlsx
            test-results/test_output.txt
          retention-days: 30
          if-no-files-found: warn

      # ── 10. Post summary to GitHub Step Summary ───────────────────────────────
      - name: "📝 Generate GitHub Actions Summary"
        if: always()
        run: |
          python << 'PYEOF'
          import os, glob, json, datetime

          summary_lines = []
          summary_lines.append("# 🧭 TripSync E2E Test Report\n")
          summary_lines.append(f"**Run:** `#{os.environ.get('GITHUB_RUN_NUMBER', '?')}` | ")
          summary_lines.append(f"**Commit:** `{os.environ.get('GITHUB_SHA', '?')[:8]}` | ")
          summary_lines.append(f"**Branch:** `{os.environ.get('GITHUB_REF_NAME', '?')}`\n\n")
          summary_lines.append(f"**App URL:** {os.environ.get('TRIPSYNC_URL', 'N/A')}  \n")
          summary_lines.append(f"**API URL:** {os.environ.get('TRIPSYNC_API_URL', 'N/A')}\n\n")

          # Parse test output
          output_file = "test-results/test_output.txt"
          if os.path.exists(output_file):
              with open(output_file) as f:
                  content = f.read()

              # Extract counts
              total = passed = failed = warned = 0
              for line in content.split('\n'):
                  if 'Total' in line and ':' in line:
                      try: total = int(line.split(':')[1].strip())
                      except: pass
                  if '✅ Pass' in line and ':' in line:
                      try: passed = int(line.split(':')[1].strip())
                      except: pass
                  if '❌ Fail' in line and ':' in line:
                      try: failed = int(line.split(':')[1].strip())
                      except: pass
                  if '⚠  Warn' in line and ':' in line:
                      try: warned = int(line.split(':')[1].strip())
                      except: pass

              pass_pct = f"{(passed/total*100):.1f}%" if total else "N/A"
              overall  = "✅ ALL PASS" if failed == 0 and total > 0 else f"❌ {failed} FAILED"

              summary_lines.append(f"## {overall}\n\n")
              summary_lines.append("| Metric | Value |\n|--------|-------|\n")
              summary_lines.append(f"| Total Tests | **{total}** |\n")
              summary_lines.append(f"| ✅ Passed | **{passed}** |\n")
              summary_lines.append(f"| ❌ Failed | **{failed}** |\n")
              summary_lines.append(f"| ⚠️ Warn/Skip | **{warned}** |\n")
              summary_lines.append(f"| Pass Rate | **{pass_pct}** |\n\n")
          else:
              summary_lines.append("⚠️ Test output file not found.\n\n")

          summary_lines.append("\n## 📥 Download Report\n")
          summary_lines.append("The `.xlsx` report is available in the **Artifacts** section above. ")
          summary_lines.append("Click **TripSync-E2E-Report-** to download.\n\n")
          summary_lines.append("### Test Categories Covered\n")
          summary_lines.append("| Category | Tests | Coverage |\n|----------|-------|----------|\n")
          summary_lines.append("| Functional | 70 | Landing, Login, Register, All 14 Dashboard pages, Mobile viewport |\n")
          summary_lines.append("| Vulnerability | 45 | XSS, SQLi, Open Redirect, HTTPS, Clickjacking, Prototype pollution, traversal |\n")
          summary_lines.append("| API Unit | 45 | All 7 endpoints, CORS, error handling, response validation, parameters |\n")
          summary_lines.append("| UI/UX | 25 | Glassmorphism, animations, hover transition effects, color contrast borders |\n\n")
          summary_lines.append(f"\n*Generated: {datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')}*\n")

          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'w') as f:
              f.writelines(summary_lines)
          print("Summary written.")
          PYEOF
